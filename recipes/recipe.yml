name: fedora-sway
description: Lean Fedora Atomic Sway nightly image

base-image: quay.io/fedora-ostree-desktops/sway-atomic
image-version: 43

modules:
  - type: rpm-ostree
    install:
      - distrobox
      - fail2ban                  # Security
      - iotop
      - jetbrains-mono-fonts
      - mako                      # Sway native notifications
      - rsms-inter-fonts
      - rtorrent
      - smartmontools
      - swayimg                   # Image Viewer
      - syncthing                 # Synch files
      - wireguard-tools           # Security VPN
      - zathura
      - zathura-pdf-mupdf
      - zram-generator-defaults
    remove:
      - dunst                     # Non-sway native notifications
      - firefox
      - firefox-langpacks
      - toolbox

  - type: files
    files:
      - source: etc
        destination: /etc/

  - type: default-flatpaks
    configurations:
      - system: true
        notify: true
        install:
          - com.bitwarden.desktop
          - com.brave.Browser
          - io.mpv.Mpv
          - md.obsidian.Obsidian                  # Wiki .md files
          - org.gnumeric.Gnumeric                 # Spreadsheets
        remove:
          - com.transmissionbt.Transmission
          - org.libreoffice.LibreOffice
          - org.videolan.VLC

  - type: script
    scripts:
      - setup-keyring
      - cleanup-flatpaks
