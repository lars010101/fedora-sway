name: Build Wolfi Distrobox Image

on:
  schedule:
    - cron: "0 3 * * *"        # Every day at 03:00 UTC
  push:
    paths:
      - "containers/wolfi-distrobox/**"
  workflow_dispatch:           # Manual trigger

jobs:
  build:
    name: Build & Push Wolfi Distrobox
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_ROBOT_USER }}
          password: ${{ secrets.QUAY_TOKEN }}

      - name: Build and push Wolfi Distrobox image
        uses: docker/build-push-action@v6
        with:
          context: containers/wolfi-distrobox
          file: containers/wolfi-distrobox/Dockerfile
          push: true
          tags: |
            quay.io/primprim/wolfi-distrobox:latest
            quay.io/primprim/wolfi-distrobox:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install crane
        uses: imjasonh/setup-crane@v0.4

      - name: Cleanup old tags
        run: |
          echo "=== Cleaning up old tags for wolfi-distrobox ==="
          crane auth login quay.io -u ${{ secrets.QUAY_ROBOT_USER }} -p ${{ secrets.QUAY_TOKEN }}

          # Keep only the 10 most recent tags
          TAGS=$(crane ls quay.io/primprim/wolfi-distrobox | sort -r | tail -n +11)

          if [ -z "$TAGS" ]; then
            echo "No old tags to delete."
          else
            for tag in $TAGS; do
              echo "Deleting: quay.io/primprim/wolfi-distrobox:$tag"
              crane delete quay.io/primprim/wolfi-distrobox:$tag || true
            done
          fi
