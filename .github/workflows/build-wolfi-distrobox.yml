name: Build Wolfi Distrobox Image

on:
  schedule:
    - cron: "0 3 * * *"        # Every day at 03:00 UTC
  push:
    paths:
      - "containers/wolfi-distrobox/**"
  workflow_dispatch:           # Manual trigger

jobs:
  build:
    name: Build & Push Wolfi Distrobox
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_ROBOT_USER }}
          password: ${{ secrets.QUAY_TOKEN }}

      - name: Build and push Wolfi Distrobox image
        uses: docker/build-push-action@v6
        with:
          context: containers/wolfi-distrobox
          file: containers/wolfi-distrobox/Dockerfile
          push: true
          tags: |
            quay.io/primprim/wolfi-distrobox:latest
            quay.io/primprim/wolfi-distrobox:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install crane
        uses: imjasonh/setup-crane@v0.4

      - name: Cleanup old tags (keep latest + last 10)
        run: |
          echo "=== Cleaning up old tags ==="
          crane auth login quay.io -u ${{ secrets.QUAY_ROBOT_USER }} -p ${{ secrets.QUAY_TOKEN }}

          REPO="quay.io/primprim/wolfi-distrobox"

          # Get all tags, keep 'latest' + the 10 most recent ones
          ALL_TAGS=$(crane ls $REPO)
          KEEP_TAGS=$(echo "$ALL_TAGS" | sort -r | head -n 10)
          KEEP_TAGS="$KEEP_TAGS latest"   # Always protect 'latest'

          echo "Tags to keep: $KEEP_TAGS"

          for tag in $ALL_TAGS; do
            if ! echo "$KEEP_TAGS" | grep -qw "$tag"; then
              echo "Deleting tag: $tag"
              crane delete $REPO:$tag || true
            fi
          done
