name: Build Fedora Sway Image

on:
  schedule:
    - cron: "00 17 * * *"        # Daily at 17:00 UTC (shortly after official images)
  push:
    paths-ignore:
      - "**.md"
      - "**.txt"
      - "LICENSE"
      - "README.md"
  pull_request:
  workflow_dispatch:             # Allows manual trigger from GitHub UI

jobs:
  build:
    name: Build Custom Sway Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write          # Needed to push to GHCR

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up BlueBuild
        uses: blue-build/github-action@v1
        with:
          recipe: recipe.yml
          image-name: fedora-sway
          tags: |
            latest
            ${{ github.sha }}
          push-to-registry: true
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Optional: Build a specific tagged version (useful for stable pinning)
      # You can add another job later if you want separate stable/beta builds
