name: Build Fedora Sway Image

on:
  schedule:
    - cron: "00 17 * * *"
  push:
    paths-ignore:
      - "**.md"
      - "**.txt"
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build & Sign Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build with BlueBuild
        uses: blue-build/github-action@v1
        with:
          recipe: recipe.yml
          cosign_private_key: ${{ secrets.SIGNING_SECRET }}
          registry: quay.io
          registry_namespace: primprim
          registry_token: ${{ secrets.QUAY_TOKEN }}
          registry_username: ${{ secrets.QUAY_ROBOT_USER }}

      - name: Cleanup old tags (keep last 10)
        run: |
          echo "Logging into Quay.io..."
          crane auth login quay.io -u ${{ secrets.QUAY_ROBOT_USER }} -p ${{ secrets.QUAY_TOKEN }}

          echo "Cleaning up old tags for fedora-sway (keeping last 10)..."
          TAGS=$(crane ls quay.io/primprim/fedora-sway | sort -r | tail -n +11)

          for tag in $TAGS; do
            echo "Deleting tag: $tag"
            crane delete quay.io/primprim/fedora-sway:$tag || true
          done
