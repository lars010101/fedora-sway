name: Build Fedora Sway Image

on:
  schedule:
    - cron: "00 17 * * *"
  push:
    paths-ignore:
      - "**.md"
      - "**.txt"
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build & Sign Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build with BlueBuild
        uses: blue-build/github-action@v1
        with:
          recipe: recipe.yml
          cosign_private_key: ${{ secrets.SIGNING_SECRET }}
          registry: quay.io
          registry_namespace: primprim
          registry_token: ${{ secrets.QUAY_TOKEN }}
          registry_username: ${{ secrets.QUAY_ROBOT_USER }}

      - name: Install crane
        uses: imjasonh/setup-crane@v0.4

      - name: Cleanup old tags (keep latest + last 10)
        run: |
          echo "=== Cleaning up old tags ==="
          crane auth login quay.io -u ${{ secrets.QUAY_ROBOT_USER }} -p ${{ secrets.QUAY_TOKEN }}

          REPO="quay.io/primprim/fedora-sway"

          # Get all tags, keep 'latest' + the 10 most recent ones
          ALL_TAGS=$(crane ls $REPO)
          KEEP_TAGS=$(echo "$ALL_TAGS" | sort -r | head -n 10)
          KEEP_TAGS="$KEEP_TAGS latest"   # Always protect 'latest'

          echo "Tags to keep: $KEEP_TAGS"

          for tag in $ALL_TAGS; do
            if ! echo "$KEEP_TAGS" | grep -qw "$tag"; then
              echo "Deleting tag: $tag"
              crane delete $REPO:$tag || true
            fi
          done
