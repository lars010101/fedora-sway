name: Build Fedora Sway Image

on:
  schedule:
    - cron: "00 17 * * *"     # Daily build
  push:
    paths-ignore:
      - "**.md"
      - "**.txt"
  pull_request:
  workflow_dispatch:          # Allows manual trigger

jobs:
  build:
    name: Build & Sign Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write         # Required for cosign signing

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build with BlueBuild
        uses: blue-build/github-action@v1
        with:
          recipe: recipe.yml
          image-name: fedora-sway
          tags: |
            latest
            ${{ github.sha }}
          push-to-registry: true
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          cosign_private_key: ${{ secrets.SIGNING_SECRET }}
